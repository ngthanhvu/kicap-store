services:
  app:
    container_name: laravel-app
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app:latest
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_MIGRATIONS: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-php3_final}
      DB_USERNAME: ${DB_APP_USERNAME:-laravel}
      DB_PASSWORD: ${DB_APP_PASSWORD:-secret}
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  db:
    container_name: laravel-db
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-php3_final}
      MYSQL_USER: ${DB_APP_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - appnet

volumes:
  dbdata:


networks:
  appnet:
    driver: bridge
